- name: two-or-more-match
  description: N-or-more matches when at least two children are satisfied
  rules:
    - name: two-or-more
      scopes:
        static: function
      features:
        - or:
            - and:
                - number: 1
                - number: 2
            - or:
                - number: 3
                - 2 or more:
                    - number: 4
                    - number: 5
                    - number: 6
  features: |
    func: 0x401000
     bb: 0x401000: basic block
      insn: 0x401000: number(5)
      insn: 0x401002: number(6)
  expect:
    matches:
      two-or-more:
        - 0x401000

