- name: bytes-exact-match
  description: bytes feature matches when extracted bytes are identical
  rules:
    - name: bytes-exact
      scopes:
        static: function
      features:
        - bytes: 90 90 90 90
  features: |
    func: 0x401000
     bb: 0x401000: basic block
      insn: 0x401000: bytes(90909090)
  expect:
    matches:
      bytes-exact:
        - 0x401000

