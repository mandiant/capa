version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      vivisect:
        patterns:
          - "vivisect"
          - "pyasn1"
          - "pyasn1-modules"
          - "msgpack"
    ignore:
      - dependency-name: "pyasn1"
        versions: ">= 0.6.0"
